<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Duo Gourmet Map</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK (App & Analytics) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG5XXOTL9cW6wxk7HodF6tSnAVYXk5Wpw",
            authDomain: "my-duo-gourmet-map.firebaseapp.com",
            projectId: "my-duo-gourmet-map",
            storageBucket: "my-duo-gourmet-map.firebasestorage.app",
            messagingSenderId: "860009297425",
            appId: "1:860009297425:web:04141812ae3738c514e3b0",
            measurementId: "G-RG56KP16NG"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        // Função global de log de eventos
        window.logFirebaseEvent = function(eventName, params = {}) {
            try {
                logEvent(analytics, eventName, params);
            } catch (error) {
                console.warn("Erro ao logar evento no Firebase:", error);
            }
        };

        // Função global para facilitar log de cliques em restaurantes (evita problemas de aspas)
        window.logRestaurantAction = function(actionType, restaurantName) {
            if (typeof window.logFirebaseEvent === 'function') {
                window.logFirebaseEvent(actionType, {
                    item_name: restaurantName
                });
            }
        };
    </script>

    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --card-bg: rgba(15, 23, 42, 0.65);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #fbcd4b;
            --accent-hover: #fcd34d;
            --border-color: rgba(255, 255, 255, 0.08);
            --font-family: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        #app-container {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Sidebar design premium (Glassmorphism) */
        #sidebar {
            width: 420px;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.25);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .logo i {
            color: var(--accent);
            font-size: 26px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .subtitle-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin: -4px 0 6px 0;
            line-height: 1.4;
            font-weight: 300;
        }

        .sidebar-obs {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.75;
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 300;
        }

        /* Inputs & Filtros */
        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            width: 100%;
            padding: 11px 16px 11px 40px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-family: var(--font-family);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(251, 205, 75, 0.15);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .filter-select {
            width: 100%;
            padding: 10px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .stats-bar {
            padding: 10px 20px;
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .restaurant-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-footer {
            padding: 12px 20px;
            background: rgba(15, 23, 42, 0.4);
            border-top: 1px solid var(--border-color);
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
        }

        .sidebar-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .sidebar-footer a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* Custom Scrollbar */
        .restaurant-list::-webkit-scrollbar {
            width: 6px;
        }
        .restaurant-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .restaurant-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .restaurant-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Restaurant Card */
        .restaurant-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .restaurant-card:hover {
            transform: translateY(-2px);
            border-color: rgba(251, 205, 75, 0.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            background: rgba(30, 41, 59, 0.8);
        }

        .card-row-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .restaurant-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            max-width: 80%;
        }

        .rating-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(251, 205, 75, 0.12);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
        }

        .cuisine-tag {
            align-self: flex-start;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 8px;
            border-radius: 6px;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .card-info-row {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .card-info-row i {
            font-size: 14px;
            width: 16px;
            text-align: center;
        }

        /* Map area */
        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }

        /* Custom Leaflet styling */
        .leaflet-bar a, .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            background-color: var(--panel-bg) !important;
            color: var(--text-main) !important;
            border-color: var(--border-color) !important;
            backdrop-filter: blur(8px);
        }
        .leaflet-bar a:hover {
            background-color: var(--card-bg) !important;
            color: var(--accent) !important;
        }
        
        /* Popup Styling */
        .leaflet-popup-content-wrapper {
            background: var(--bg-color) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            padding: 4px;
            backdrop-filter: blur(10px);
        }

        .leaflet-popup-tip {
            background: var(--bg-color) !important;
            border: 1px solid var(--border-color);
        }

        .popup-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 250px;
            max-width: 320px;
            padding: 8px;
        }

        .popup-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .popup-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .popup-cuisine {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        .popup-address {
            font-size: 13px;
            color: var(--text-muted);
            margin: 4px 0;
            line-height: 1.4;
        }

        .popup-address i {
            color: var(--accent);
            margin-right: 6px;
        }

        .popup-description {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            margin: 6px 0;
            line-height: 1.4;
            border-left: 2px solid var(--accent);
            padding-left: 6px;
            max-height: 75px;
            overflow-y: auto;
        }

        .popup-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 4px 0;
            font-size: 11px;
        }

        .popup-contact .contact-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-main);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .popup-contact a.contact-item:hover {
            background: rgba(251, 205, 75, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .popup-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .popup-btn {
            flex: 1;
            text-align: center;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-google {
            background: #4285f4;
            color: white;
        }}

        .btn-google:hover {
            background: #357ae8;
        }

        .btn-duo {
            background: rgba(251, 205, 75, 0.1);
            color: var(--accent);
            border: 1px solid rgba(251, 205, 75, 0.3);
        }

        .btn-duo:hover {
            background: rgba(251, 205, 75, 0.2);
        }

        /* Horários no Popup */
        .popup-schedule-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .popup-schedule-table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
            margin-top: 4px;
            color: var(--text-muted);
        }

        .popup-schedule-table th, .popup-schedule-table td {
            text-align: left;
            padding: 3px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .popup-schedule-table th {
            color: var(--text-main);
            font-weight: 600;
        }

        /* Sidebar Toggle Button */
        .toggle-btn {
            position: absolute;
            right: -40px;
            top: 20px;
            width: 40px;
            height: 40px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-left: none;
            border-radius: 0 10px 10px 0;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .sidebar-collapsed #sidebar {
            margin-left: -420px;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            #app-container {
                flex-direction: column-reverse;
            }
            #sidebar {
                width: 100%;
                height: 50%;
            }
            .toggle-btn {
                display: none;
            }
            .sidebar-collapsed #sidebar {
                margin-left: 0;
                height: 0;
                overflow: hidden;
            }
        }

        /* Estilo marcador localização do usuário */
        .user-location-marker {
            background-color: #3b82f6;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
            position: relative;
        }
        .user-location-marker::after {
            content: '';
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: rgba(59, 130, 246, 0.3);
            position: absolute;
            top: -12px;
            left: -12px;
            animation: pulse 2.2s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="toggle-btn" onclick="toggleSidebar()">
                <i id="toggle-icon" class="fa-solid fa-chevron-left"></i>
            </div>
            
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-utensils"></i>
                    <h1>My Duo <span>Gourmet</span> Map</h1>
                </div>
                <p class="subtitle-desc">Encontre mais facilmente seu Duo Gourmet favorito</p>
                <div class="sidebar-obs"><i class="fa-solid fa-circle-info"></i> Obs: Atualmente somente região da Grande BH</div>
                
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar restaurante..." oninput="filterRestaurants()">
                </div>
                
                <div class="filters-grid">
                    <select id="cityFilter" class="filter-select" onchange="onCityChange()">
                        <option value="">Todas as Cidades</option>
                    </select>
                    <select id="neighborhoodFilter" class="filter-select" onchange="filterRestaurants()">
                        <option value="">Todos os Bairros</option>
                    </select>
                    <select id="cuisineFilter" class="filter-select" onchange="filterRestaurants()">
                        <option value="">Todas as Cozinhas</option>
                    </select>
                    <select id="dayFilter" class="filter-select" onchange="filterRestaurants()">
                        <option value="">Qualquer dia</option>
                        <option value="Hoje">Hoje</option>
                        <option value="Segunda-feira">Segunda-feira</option>
                        <option value="Terça-feira">Terça-feira</option>
                        <option value="Quarta-feira">Quarta-feira</option>
                        <option value="Quinta-feira">Quinta-feira</option>
                        <option value="Sexta-feira">Sexta-feira</option>
                        <option value="Sábado">Sábado</option>
                        <option value="Domingo">Domingo</option>
                    </select>
                    <select id="periodFilter" class="filter-select" onchange="filterRestaurants()" style="grid-column: span 2;">
                        <option value="">Qualquer horário (Almoço ou Jantar)</option>
                        <option value="almoco">Somente Almoço</option>
                        <option value="jantar">Somente Jantar</option>
                    </select>
                </div>
            </div>
            
            <div class="stats-bar">
                <span id="resultsCount">Carregando restaurantes...</span>
                <span id="clearFiltersBtn" style="cursor: pointer; color: var(--accent); display: none;" onclick="clearAllFilters()">
                    <i class="fa-solid fa-filter-circle-xmark"></i> Limpar filtros
                </span>
            </div>
            
            <div class="restaurant-list" id="restaurantList">
                <!-- Preenchido via JS -->
            </div>
            
            <div class="sidebar-footer">
                Created By <a href="https://rogerioc.github.io/about/" target="_blank">Rogerio C.S</a><br>
                Dados extraídos de <a href="https://www.duogourmet.com.br" target="_blank">Duo Gourmet</a> &copy;
            </div>
        </div>
        
        <!-- Map -->
        <div id="map"></div>
        
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

        function initMap() {

            const googleStreets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {

                attribution: '&copy; Google Maps'
            });

            const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                attribution: '&copy; Google Maps'
            });

            const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            });

            const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            });

            // Inicializar o mapa centrado em Belo Horizonte usando Google Maps por padrão
            map = L.map('map', { 
                zoomControl: false, 
                layers: [googleStreets] 
            }).setView([-19.925, -43.935], 13);
            
            // Adicionar controle de zoom no lado direito
            L.control.zoom({ position: 'topright' }).addTo(map);

            // Adicionar controle de camadas para alternar entre as visualizações
            const baseMaps = {
                "Google Maps Standard": googleStreets,
                "Google Maps Satélite": googleHybrid,
                "Tema Escuro (Carto)": cartoDark,
                "OpenStreetMap": osm
            };
            L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);

            markerCluster = L.markerClusterGroup({

            [...cities].sort().forEach(c => {

            [...cuisines].sort().forEach(c => {

            });
            
            updateNeighborhoodDropdown();
        }

            restaurants.forEach(r => {

            });

                iconSize: [14, 14],
                iconAnchor: [7, 7]
            });
        }

        function generatePopupHTML(r) {
            // Gerar tabela de horários
            let scheduleRows = "";
            const daysOrder = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado', 'Domingo'];
            
            daysOrder.forEach(day => {
                const sched = r.schedule[day] || r.schedule[day + ' (Hoje)'] || {};
                const almoco = sched.almoco || "-";
                const jantar = sched.jantar || "-";
                
                // Destacar o dia atual
                const isToday = day === todayDayName;
                const highlightStyle = isToday ? "style='font-weight: 700; color: var(--accent); background: rgba(251,205,75,0.06)'" : "";
                
                scheduleRows += `<tr ${highlightStyle}>
                    <td>${day.split('-')[0]}</td>
                    <td>${almoco}</td>
                    <td>${jantar}</td>
                </tr>`;
            });

            const fullUrl = r.url.startsWith('http') ? r.url : `https://www.duogourmet.com.br${r.url}`;
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name + ", " + r.address)}`;

            let contactHtml = "";
            if (r.phone || r.instagram || r.website) {
                contactHtml += '<div class="popup-contact">';
                if (r.phone) {
                    contactHtml += `<span class="contact-item"><i class="fa-solid fa-phone"></i> ${r.phone}</span>`;
                }
                if (r.instagram) {
                    const handle = r.instagram.replace('@', '');
                    contactHtml += `<a href="https://instagram.com/${handle}" target="_blank" class="contact-item" onclick="window.logRestaurantAction('click_instagram', decodeURIComponent('${encodeURIComponent(r.name)}'))"><i class="fa-brands fa-instagram"></i> ${r.instagram}</a>`;
                }
                if (r.website) {
                    contactHtml += `<a href="${r.website}" target="_blank" class="contact-item" onclick="window.logRestaurantAction('click_website', decodeURIComponent('${encodeURIComponent(r.name)}'))"><i class="fa-solid fa-globe"></i> Site</a>`;
                }
                contactHtml += '</div>';
            }

            let descriptionHtml = "";
            if (r.description) {
                descriptionHtml = `<div class="popup-description" title="${r.description}">${r.description}</div>`;
            }

            return `
                <div class="popup-content">
                    <div class="popup-header">
                        <div>
                            <div class="popup-name">${r.name}</div>
                            <div class="popup-cuisine">${r.cuisine}</div>
                        </div>
                        <div class="rating-badge">
                            <i class="fa-solid fa-star"></i> ${r.rating}
                        </div>
                    </div>
                    <div class="popup-address">
                        <i class="fa-solid fa-map-pin"></i><strong>${r.neighborhood} (${r.city})</strong>: ${r.address}
                    </div>
                    
                    ${contactHtml}
                    ${descriptionHtml}
                    
                    <div class="popup-schedule-title">
                        <i class="fa-regular fa-calendar"></i> Horários Disponíveis no Duo
                    </div>
                    <table class="popup-schedule-table">
                        <thead>
                            <tr>
                                <th>Dia</th>
                                <th>Almoço</th>
                                <th>Jantar</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${scheduleRows}
                        </tbody>
                    </table>

                    <div class="popup-actions">
                        <a href="${mapsUrl}" target="_blank" class="popup-btn btn-google" onclick="window.logRestaurantAction('click_google_maps', decodeURIComponent('${encodeURIComponent(r.name)}'))">
                            <i class="fa-solid fa-location-dot"></i> Google Maps
                        </a>
                        <a href="${fullUrl}" target="_blank" class="popup-btn btn-duo" onclick="window.logRestaurantAction('click_view_on_duo', decodeURIComponent('${encodeURIComponent(r.name)}'))">
                            <i class="fa-solid fa-link"></i> Ver no Duo
                        </a>
                    </div>
                </div>
            `;
        }

        function renderListAndMarkers() {
            // Limpar lista e marcadores
            const listContainer = document.getElementById('restaurantList');
            listContainer.innerHTML = "";
            markerCluster.clearLayers();
            markers = [];

            const searchVal = activeFilters.search.toLowerCase();
            const cuisineVal = activeFilters.cuisine;
            const neighborhoodVal = activeFilters.neighborhood;
            const cityVal = activeFilters.city;
            const dayVal = activeFilters.day;
            const periodVal = activeFilters.period;

            // Mostrar/ocultar botão "Limpar filtros"
            const hasActiveFilters = searchVal || cuisineVal || neighborhoodVal || cityVal || dayVal || periodVal;
            document.getElementById('clearFiltersBtn').style.display = hasActiveFilters ? "inline" : "none";

            // Filtrar restaurantes
            const filtered = restaurants.filter(r => {
                const matchesSearch = r.name.toLowerCase().includes(searchVal) || 
                                      r.neighborhood.toLowerCase().includes(searchVal) ||
                                      r.cuisine.toLowerCase().includes(searchVal);
                
                const matchesCity = !cityVal || r.city === cityVal;
                const matchesCuisine = !cuisineVal || r.cuisine === cuisineVal;
                const matchesNeighborhood = !neighborhoodVal || r.neighborhood === neighborhoodVal;

                // Filtrar por dia da semana e período
                let matchesDayTime = true;
                if (dayVal) {
                    let targetDay = dayVal;
                    if (dayVal === 'Hoje') {
                        targetDay = todayDayName;
                    }
                    const daySched = r.schedule[targetDay] || r.schedule[targetDay + ' (Hoje)'];
                    if (!daySched) {
                        matchesDayTime = false;
                    } else {
                        const hasAlmoco = !!daySched.almoco;
                        const hasJantar = !!daySched.jantar;
                        
                        if (periodVal === 'almoco' && !hasAlmoco) matchesDayTime = false;
                        else if (periodVal === 'jantar' && !hasJantar) matchesDayTime = false;
                        else if (!hasAlmoco && !hasJantar) matchesDayTime = false; // fechado no dia
                    }
                } else if (periodVal) {
                    // Se selecionou período mas não especificou o dia, verifica se abre nesse período em QUALQUER dia da semana
                    let opensInPeriodAnyDay = false;
                    const daysList = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado', 'Domingo'];
                    for (const d of daysList) {
                        const daySched = r.schedule[d] || r.schedule[d + ' (Hoje)'];
                        if (daySched) {
                            if (periodVal === 'almoco' && daySched.almoco) opensInPeriodAnyDay = true;
                            if (periodVal === 'jantar' && daySched.jantar) opensInPeriodAnyDay = true;
                        }
                    }
                    if (!opensInPeriodAnyDay) matchesDayTime = false;
                }

                return matchesSearch && matchesCity && matchesCuisine && matchesNeighborhood && matchesDayTime;
            });

            // Atualizar contagem
            document.getElementById('resultsCount').textContent = `${filtered.length} restaurantes encontrados`;

            // Criar elementos de lista e marcadores do mapa
            filtered.forEach(r => {
                // Marcador no Mapa
                const marker = L.marker([r.lat, r.lon], { icon: getMarkerColor(r.color) });
                marker.bindPopup(generatePopupHTML(r));
                
                // Rastreamento de visualização de detalhes do restaurante no mapa
                marker.on('popupopen', () => {
                    if (typeof window.logFirebaseEvent === 'function') {
                        window.logFirebaseEvent('view_item', {
                            item_id: r.name,
                            item_name: r.name,
                            item_category: r.cuisine,
                            location_id: r.neighborhood,
                            city: r.city
                        });
                    }
                });
                
                // Salvar referência do restaurante no marcador
                marker.restaurantData = r;
                markerCluster.addLayer(marker);
                markers.push(marker);

                // Item da Lista
                const card = document.createElement('div');
                card.className = "restaurant-card";
                card.onclick = () => {
                    // Focar no mapa e abrir popup
                    map.setView([r.lat, r.lon], 16);
                    marker.openPopup();
                    
                    // Rastreamento de clique no card da lista
                    if (typeof window.logFirebaseEvent === 'function') {
                        window.logFirebaseEvent('select_item', {
                            item_id: r.name,
                            item_name: r.name,
                            item_category: r.cuisine,
                            location_id: r.neighborhood,
                            source: 'list'
                        });
                    }
                    
                    // Em telas pequenas, fechar a sidebar para mostrar o mapa
                    if (window.innerWidth <= 768) {
                        document.body.classList.add('sidebar-collapsed');
                        document.getElementById('toggle-icon').className = "fa-solid fa-chevron-right";
                    }
                };

                const cleanAddress = r.address.replace(', ' + r.city + ',', '').replace(', ' + r.city, '').replace(', MG', '');

                card.innerHTML = `
                    <div class="card-row-top">
                        <div class="restaurant-title">${r.name}</div>
                        <div class="rating-badge">
                            <i class="fa-solid fa-star"></i> ${r.rating}
                        </div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 4px;">
                        <span class="cuisine-tag">${r.cuisine}</span>
                        <span style="font-size:12px; color:var(--accent); font-weight:600">${r.neighborhood} (${r.city})</span>
                    </div>
                    <div class="card-info-row">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>${cleanAddress}</span>
                    </div>
                `;
                
                listContainer.appendChild(card);
            });
        }

        let filterLogTimeout;
        function filterRestaurants() {
            activeFilters.search = document.getElementById('searchInput').value;
            activeFilters.cuisine = document.getElementById('cuisineFilter').value;
            activeFilters.neighborhood = document.getElementById('neighborhoodFilter').value;
            activeFilters.city = document.getElementById('cityFilter').value;
            activeFilters.day = document.getElementById('dayFilter').value;
            activeFilters.period = document.getElementById('periodFilter').value;
            renderListAndMarkers();

            // Debounce para evitar inundar o Firebase Analytics com eventos de digitação
            clearTimeout(filterLogTimeout);
            filterLogTimeout = setTimeout(() => {
                if (typeof window.logFirebaseEvent === 'function') {
                    window.logFirebaseEvent('filter_applied', {
                        search_query: activeFilters.search,
                        cuisine: activeFilters.cuisine || 'todas',
                        neighborhood: activeFilters.neighborhood || 'todos',
                        city: activeFilters.city || 'todas',
                        day: activeFilters.day || 'todos',
                        period: activeFilters.period || 'todos'
                    });
                }
            }, 700);
        }

        function clearAllFilters() {
            document.getElementById('searchInput').value = "";
            document.getElementById('cuisineFilter').value = "";
            document.getElementById('cityFilter').value = "";
            document.getElementById('dayFilter').value = "";
            document.getElementById('periodFilter').value = "";
            
            // Resetar bairros
            updateNeighborhoodDropdown();
            document.getElementById('neighborhoodFilter').value = "";

            if (typeof window.logFirebaseEvent === 'function') {
                window.logFirebaseEvent('clear_filters');
            }

            filterRestaurants();
        }

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-collapsed');
            const icon = document.getElementById('toggle-icon');
            const isCollapsed = document.body.classList.contains('sidebar-collapsed');
            
            if (document.body.classList.contains('sidebar-collapsed')) {
                icon.className = "fa-solid fa-chevron-right";
            } else {
                icon.className = "fa-solid fa-chevron-left";
            }
            
            if (typeof window.logFirebaseEvent === 'function') {
                window.logFirebaseEvent('toggle_sidebar', { collapsed: isCollapsed });
            }
            
            setTimeout(() => map.invalidateSize(), 300);
        }

        let userMarker;

        function locateUser(e, silent = false) {
            if (e) e.preventDefault();
            
            if (typeof window.logFirebaseEvent === 'function') {
                window.logFirebaseEvent('click_geolocation', { silent: silent });
            }
            
            if (!navigator.geolocation) {
                if (!silent) alert("Geolocalização não é suportada pelo seu navegador.");
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    const userLocationIcon = L.divIcon({
                        html: '<div class="user-location-marker"></div>',
                        className: 'custom-user-marker',
                        iconSize: [14, 14],
                        iconAnchor: [7, 7]
                    });
                    
                    if (userMarker) {
                        userMarker.setLatLng([lat, lon]);
                    } else {
                        userMarker = L.marker([lat, lon], { icon: userLocationIcon }).addTo(map);
                        userMarker.bindPopup("<b>Sua localização atual</b>");
                    }
                    
                    if (!silent) {
                        map.setView([lat, lon], 15);
                        userMarker.openPopup();
                    }
                },
                function(error) {
                    console.warn("Erro ao obter geolocalização:", error);
                    if (!silent && error.code !== error.PERMISSION_DENIED) {
                        alert("Não foi possível obter sua localização atual. Verifique as configurações de localização.");
                    }
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        }

        window.onload = initMap;
    </script>
</body>
</html>
